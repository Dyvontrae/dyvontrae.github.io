<!DOCTYPE html>
<html lang="en">
<!-- 
    Portfolio Website for Dyvontrae Johnson
    Core portfolio implementation
    Last Updated: November 2024
-->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dyvontrae Johnson - Portfolio</title>
    
    <!-- Core Stylesheet Imports -->
    <link rel="stylesheet" href="css/bootstrap.css" type="text/css">
    <link rel="stylesheet" href="style.css" type="text/css">
    <link rel="stylesheet" href="css/dark.css" type="text/css">
    <link rel="stylesheet" href="css/font-icons.css" type="text/css">
    <link rel="stylesheet" href="one-page/onepage.css" type="text/css">
    <link rel="stylesheet" href="one-page/css/et-line.css" type="text/css">
</head>

<body class="stretched">
    <!-- Main Site Wrapper -->
    <div id="wrapper" class="clearfix">
        <!-- 
            Header Section
            Fixed navigation and branding
        -->
        <header id="header" class="full-header header-size-custom" data-sticky-shrink="false">
            <div id="header-wrap">
                <div class="container">
                    <div class="header-row">
                        <!-- Logo -->
                        <div id="logo">
                            <a href="index.html" class="standard-logo">
                                <img src="one-page/images/canvasone.png" alt="Canvas Logo">
                            </a>
                            <a href="index.html" class="retina-logo">
                                <img src="one-page/images/canvasone@2x.png" alt="Canvas Logo">
                            </a>
                        </div>

                        <!-- Navigation -->
                        <nav id="primary-menu">
                            <ul>
                                <li><a href="#capabilities"><div>Capabilities</div></a></li>
                                <li><a href="mailto:roybot06@gmail.com"><div>Contact</div></a></li>
                                <li><a href="https://mechagorilla.square.site/" data-lightbox="iframe">
                                    <div>Mecha Gorilla Store</div></a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </header>

        <!-- 
            Main Content Section
            Portfolio grid and sidebar content
        -->
        <section id="content" class="content-wrap py-0">
            <div id="portfolio" class="section m-0">
                <div class="container">
                    <div class="portfolio grid-container row g-0">
                        <!-- YouTube Portfolio Item -->
                        <article class="portfolio-item">
                            <div class="portfolio-image">
                                <img src="works/video/youtube-channel.jpg" alt="YouTube Channel">
                                <div class="bg-overlay">
                                    <div class="bg-overlay-content flex-column hover-animate" data-hover-animate="fadeIn">
                                        <a href="https://youtube.com/Roybot06" data-lightbox="iframe"></a>
                                        <div class="portfolio-desc p-0 center">
                                            <h3>My YouTube Channel</h3>
                                            <span>Video Production</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </article>

                        <!-- Texas Toku Taisen Portfolio Item -->
                        <article class="portfolio-item">
                            <div class="portfolio-image">
                                <img src="works/events/TTT_banner_img.png" alt="Texas Toku Taisen">
                            </div>
                        </article>
                    </div>
                </div>
            </div>

            <!-- Sidebar Content -->
            <div class="sidebar col-lg-3">
                <div class="sidebar-widgets-wrap">
                    <!-- Instagram Feed Widget -->
                    <div class="widget clearfix">
                        <h4>Instagram Photos</h4>
                        <div id="instagram-photos" class="instagram-photos masonry-thumbs grid-container grid-4" 
                             data-user="roybot06">
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="widget quick-contact-widget form-widget clearfix">
                        <h4>Quick Contact</h4>
                        <div class="form-result"></div>
                        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="quick-contact-form">
                            <input type="text" 
                                   class="required sm-form-control input-block-level" 
                                   name="name" 
                                   placeholder="Full Name" 
                                   required />
                            
                            <input type="email" 
                                   class="required sm-form-control email input-block-level" 
                                   name="_replyto" 
                                   placeholder="Email Address" 
                                   required />
                            
                            <textarea class="required sm-form-control input-block-level short-textarea" 
                                      name="message" 
                                      rows="4" 
                                      placeholder="Message" 
                                      required></textarea>

                            <input type="text" name="_gotcha" style="display:none" />
                            
                            <button type="submit" class="button button-small button-3d m-0">
                                Send Email
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer id="copyrights">
            <div class="container topmargin-sm center ls2 text-uppercase clearfix">
                Copyrights © Dyvontrae Johnson 2025 | All Rights Reserved
                <div class="center topmargin-sm">
                    <a href="https://www.youtube.com/roybot06" class="social-icon inline-block si-borderless si-small si-youtube" title="YouTube">
                        <i class="icon-youtube"></i>
                    </a>
                    <a href="https://www.github.com/roybotO6" class="social-icon inline-block si-borderless si-small si-github" title="Github">
                        <i class="icon-github"></i>
                    </a>
                    <a href="https://www.github.com/dyvontrae" class="social-icon inline-block si-borderless si-small si-github" title="Github">
                        <i class="icon-github"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/dyvontrae-johnson/" class="social-icon inline-block si-borderless si-small si-linkedin" title="LinkedIn">
                        <i class="icon-linkedin"></i>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Back to Top Button -->
    <div id="gotoTop" class="icon-angle-up"></div>

    <!-- Core Scripts -->
    <script src="js/jquery.js"></script>
    <script src="js/plugins.min.js"></script>
    <script src="js/functions.js"></script>
</body>
</html>
